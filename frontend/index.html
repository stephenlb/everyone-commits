<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Stream Test</title>

<style>
:root {
    color-scheme: dark;
    --radius: 16px;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: url("background.jpg") center/cover no-repeat;
    filter: blur(1.50px);
    transform: scale(1.08);

    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;

    background: rgba(0,0,0,.1);

    z-index: -1;
}



/* Vertical Shorts feed */

#feed {

    width: 100%;
    height: 100dvh;

    overflow-y: scroll;

    scroll-snap-type: y mandatory;

    /* Hide scrollbar but keep scrolling. */
    scrollbar-width: none;
}

#feed::-webkit-scrollbar {
    display: none;
}



.slide {

    position: relative;

    width: 100%;
    height: 100dvh;

    scroll-snap-align: start;
    scroll-snap-stop: always;

    display: flex;
    align-items: center;
    justify-content: center;
}



.slide video {

    width: min(92vw, 500px);
    height: min(92dvh, 900px);

    background: #000;

    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);

    object-fit: contain;

    box-shadow: 0 20px 50px rgba(0,0,0,.55);

    cursor: pointer;
}



.slide .caption {

    position: absolute;

    left: 50%;
    bottom: 6dvh;
    transform: translateX(-50%);

    max-width: min(88vw, 460px);

    padding: 8px 16px;

    font-size: 14px;

    background: rgba(0,0,0,.55);

    border: 1px solid rgba(255,255,255,.2);
    border-radius: var(--radius);

    backdrop-filter: blur(10px);

    pointer-events: none;
}



/* Play + mute overlay badge */

.slide .badge {

    position: absolute;

    top: 4dvh;
    right: calc(50% - min(46vw, 250px) + 12px);

    display: flex;
    gap: 6px;
}


.slide .badge button {

    width: 36px;
    height: 36px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(0,0,0,.6);

    color: white;

    border: 1px solid rgba(255,255,255,.2);
    border-radius: 50%;

    cursor: pointer;

    font-size: 15px;

    backdrop-filter: blur(10px);
}



#feed-status {

    height: 12dvh;

    display: flex;
    align-items: center;
    justify-content: center;

    scroll-snap-align: start;

    font-size: 13px;
    color: rgba(255,255,255,.7);
}



/* Upload — floating bar */

#upload-panel {

    position: fixed;

    top: 12px;
    left: 50%;
    transform: translateX(-50%);

    z-index: 10;

    width: min(92vw, 700px);

    display: flex;
    flex-wrap: wrap;
    align-items: center;

    gap: 8px;

    padding: 10px 12px;

    background: rgba(0,0,0,.75);

    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);

    backdrop-filter: blur(10px);
}



#upload-panel input[type="text"] {

    flex: 1;
    min-width: 120px;

    height: 34px;

    background: #000;

    color: white;

    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;

    padding: 5px 10px;
}



#upload-panel button {

    height: 34px;

    padding: 0 16px;

    background: #111;

    color: white;

    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;

    cursor: pointer;
}



#upload-panel button:disabled {

    opacity: .5;

    cursor: default;
}



#uploadStatus {

    width: 100%;

    min-height: 16px;

    font-size: 12px;

    color: #ffcf80;
}

</style>

</head>

<body>


<div id="upload-panel">

    <input id="uploadTitle"
           type="text"
           placeholder="Title">


    <input id="uploadDescription"
           type="text"
           placeholder="Description">


    <input id="uploadFile"
           type="file"
           accept="video/*">


    <button id="uploadButton">
        Upload
    </button>


    <div id="uploadStatus"></div>

</div>



<div id="feed">

    <div id="feed-status">Loading…</div>

</div>



<script>

const feed = document.getElementById("feed");
const feedStatus = document.getElementById("feed-status");


const origin =
    window.location.protocol === "file:"
    ? "http://0.0.0.0:8000"
    : window.location.origin;



/* ---- Feed state ---- */

const PAGE_SIZE = 5;

// Tracks which video ids are already on screen — guards against
// duplicates (e.g. a fresh upload prepended before its page loads).
const loadedIds = new Set();

let offset = 0;          // real DB offset into /videos.
let loading = false;
let exhausted = false;   // backend returned nothing new — stop asking.

// Feed muted by default so autoplay is allowed; tap unmutes.
let muted = true;



/* Play the centered video, pause the rest. */
const playObserver = new IntersectionObserver((entries)=>{

    for(const entry of entries) {

        const video = entry.target;

        if(entry.isIntersecting) {
            video.play().catch(()=>{});
        } else {
            video.pause();
        }
    }

}, { threshold: 0.6 });



/* Attach a real src only when a slide gets close to the viewport. */
const loadObserver = new IntersectionObserver((entries)=>{

    for(const entry of entries) {

        if(!entry.isIntersecting) continue;

        const video = entry.target;

        if(!video.src && video.dataset.src) {
            video.src = video.dataset.src;
        }

        loadObserver.unobserve(video);
    }

}, { rootMargin: "200% 0px" });



/* Load more when the status sentinel scrolls into view. */
const sentinelObserver = new IntersectionObserver((entries)=>{

    if(entries[0].isIntersecting) loadMore();

}, { rootMargin: "300% 0px" });

sentinelObserver.observe(feedStatus);



function makeSlide(video) {

    const slide = document.createElement("div");
    slide.className = "slide";


    const el = document.createElement("video");

    // A direct src (e.g. the preset fallback) loads immediately; feed
    // videos defer to dataset.src until loadObserver attaches them.
    if(video.src)
        el.src = video.src;
    else
        el.dataset.src =
            `${origin}/stream?video_id=${encodeURIComponent(video.id)}`;

    el.muted = muted;
    el.loop = true;
    el.playsInline = true;
    el.preload = "metadata";

    // Tap the video to toggle play/pause.
    el.addEventListener("click", ()=>{
        if(el.paused) el.play().catch(()=>{});
        else el.pause();
    });


    const badge = document.createElement("div");
    badge.className = "badge";

    const muteButton = document.createElement("button");
    muteButton.textContent = muted ? "🔇" : "🔊";
    muteButton.addEventListener("click", ()=>toggleMute());
    badge.appendChild(muteButton);


    const caption = document.createElement("div");
    caption.className = "caption";
    caption.textContent = video.title || "Untitled";


    slide.append(el, badge, caption);


    playObserver.observe(el);
    loadObserver.observe(el);

    return slide;
}



function toggleMute() {

    muted = !muted;

    for(const el of feed.querySelectorAll("video"))
        el.muted = muted;

    for(const button of feed.querySelectorAll(".badge button"))
        button.textContent = muted ? "🔇" : "🔊";
}



async function loadMore() {

    if(loading || exhausted) return;

    loading = true;


    // Paged, newest-first list from the backend.
    try {

        const response =
            await fetch(`${origin}/videos?limit=${PAGE_SIZE}&offset=${offset}`);

        if(!response.ok)
            throw new Error(`Feed failed (${response.status})`);


        const data =
            await response.json();


        const page = data.videos || [];


        offset += page.length;


        for(const video of page) {
            if(loadedIds.has(video.id)) continue;
            loadedIds.add(video.id);
            feed.insertBefore(makeSlide(video), feedStatus);
        }


        // A short (or empty) page means we've reached the end of the table.
        if(page.length < PAGE_SIZE) {
            exhausted = true;
            feedStatus.textContent =
                loadedIds.size ? "You're all caught up." : "No videos yet.";
        } else {
            feedStatus.textContent = "Loading…";
        }

    } catch(error) {

        console.error(error);

        // Backend unreachable — seed the feed with a preset video once.
        if(loadedIds.size === 0) {
            const slide = makeSlide({
                src: "../data/videos/019f7674-d289-7eb1-90a9-4d4136739cfb.mp4",
                title: "Preset video",
            });
            feed.insertBefore(slide, feedStatus);
        }

        exhausted = true;
        feedStatus.textContent = "Backend unavailable — playing preset video.";

    } finally {

        loading = false;
    }
}



loadMore();



/* ---- Upload ---- */

const uploadTitle = document.getElementById("uploadTitle");
const uploadDescription = document.getElementById("uploadDescription");
const uploadFile = document.getElementById("uploadFile");
const uploadButton = document.getElementById("uploadButton");
const uploadStatus = document.getElementById("uploadStatus");



uploadButton.onclick = async ()=>{

    const file = uploadFile.files[0];

    if(!file) {
        uploadStatus.textContent = "Choose a video file first.";
        return;
    }


    // /upload takes title + description as query params and the
    // file in the body, then hands it to videos.upload_cdn() which
    // sends it to PubNub Files via send_file().
    const params = new URLSearchParams({
        title: uploadTitle.value,
        description: uploadDescription.value,
    });


    const body = new FormData();
    body.append("file", file);


    uploadButton.disabled = true;
    uploadStatus.textContent = "Uploading to PubNub…";


    try {

        const response =
            await fetch(`${origin}/upload?${params}`, {
                method: "POST",
                body,
            });


        if(!response.ok)
            throw new Error(`Upload failed (${response.status})`);


        const data =
            await response.json();


        uploadStatus.textContent =
            `Uploaded "${data.title}" — added to feed.`;


        // Prepend the freshly uploaded video and scroll to it.
        if(!loadedIds.has(data.id)) {
            loadedIds.add(data.id);

            const slide = makeSlide({ id: data.id, title: data.title });
            feed.insertBefore(slide, feed.firstChild);

            slide.scrollIntoView({ behavior: "smooth" });
        }

    } catch(error) {

        console.error(error);
        uploadStatus.textContent = error.message;

    } finally {

        uploadButton.disabled = false;

    }

};

</script>

</body>
</html>
