<h1>Video Stream Test</h1>
<video id="player" autoplay controls></video>

<script>
(async () => {
    const origin = window.location.origin || "http://0.0.0.0:8000";
    const player = document.getElementById("player");

    const response = await fetch(`${origin}/video?query=Beep&limit=2`);
    const videos = await response.json();
    const videoId = videos.videos[0].id;

    player.src = `${origin}/stream?video_id=${encodeURIComponent(videoId)}`;

    console.log(origin);
    console.log(videos);
})();
</script>
