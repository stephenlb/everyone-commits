<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Test</title>

<style>
:root {
    color-scheme: dark;
    --radius: 18px;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
}

/* Blurred background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("background.jpg") center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.08);
    z-index: -2;
}

/* Slight dark overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.1);
    z-index: -1;
}

h1 {
    margin: 0;
    padding: 12px 28px;
    font-size: 2rem;
    font-weight: 700;
    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    text-shadow: 0 2px 10px rgba(0,0,0,.6);
}

/* Auto-scale to fit the window */
video {
    display: block;
    width: auto;
    height: auto;
    max-width: calc(100vw - 48px);
    max-height: calc(100vh - 160px);
    object-fit: contain;

    /* Match the black bars to the video's black */
    background: #000;

    border: 2px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.55);
}
</style>
<script>
const player = document.getElementById("player");

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
        player.currentTime += 10;
    }

    if (e.key === "ArrowLeft") {
        player.currentTime -= 10;
    }
});
</script>
</head>
<body>

    <h1>Video Stream Test</h1>

    <video id="player" autoplay controls></video>

    <script>
        (async () => {
            const origin =
                window.location.protocol === "file:"
                    ? "http://0.0.0.0:8000"
                    : window.location.origin;

            const player = document.getElementById("player");

            try {
                const response = await fetch(`${origin}/video?query=Beep&limit=2`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const videos = await response.json();

                if (!videos.videos || videos.videos.length === 0) {
                    throw new Error("No videos found.");
                }

                const videoId = videos.videos[0].id;

                player.src = `${origin}/stream?video_id=${encodeURIComponent(videoId)}`;

                console.log("Origin:", origin);
                console.log(videos);
            } catch (err) {
                console.error(err);
                document.body.insertAdjacentHTML(
                    "beforeend",
                    `<p style="color:#ff8080">Error: ${err.message}</p>`
                );
            }
        })();
    </script>
<div id="custom-controls">
    <button onclick="videoSkip(-10)">⏪ 10s</button>
    <button onclick="videoToggle()">▶ / ⏸</button>
    <button onclick="videoSkip(10)">10s ⏩</button>

    <input id="videoSeek" type="range" min="0" value="0" step="0.1">

    <input id="videoSpeed" type="number" min="0.1" max="99" step="0.1" value="1">
    <span>x</span>
</div>

<style>
#custom-controls {
    width: min(90vw, 900px);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: rgba(0,0,0,.7);
    border-radius: 16px;
    backdrop-filter: blur(10px);
}

#custom-controls button,
#custom-controls input {
    background: #111;
    color: white;
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 10px;
    padding: 8px;
}

#videoSeek {
    flex: 1;
}
</style>

<script>
const video = document.getElementById("player");
const seek = document.getElementById("videoSeek");
const speed = document.getElementById("videoSpeed");

video.controls = false;

function videoSkip(seconds) {
    video.currentTime += seconds;
}

function videoToggle() {
    if (video.paused) {
        video.play();
    } else {
        video.pause();
    }
}

video.addEventListener("loadedmetadata", () => {
    seek.max = video.duration;
});

video.addEventListener("timeupdate", () => {
    seek.value = video.currentTime;
});

seek.addEventListener("input", () => {
    video.currentTime = seek.value;
});

speed.addEventListener("input", () => {
    let value = Number(speed.value);

    if (value < 0.1) value = 0.1;
    if (value > 99) value = 99;

    speed.value = value;
    video.playbackRate = value;
});
</script>
</body>
</html>
