name: Auto Merge Pull Requests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  automerge:
    runs-on: ubuntu-latest

    steps:
      - name: Auto Merge or Close
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Wait a few seconds so GitHub calculates mergeability
            await new Promise(resolve => setTimeout(resolve, 5000));

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            if (pr.data.mergeable === false) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: [
                  "## ❌ Automatic merge failed",
                  "",
                  "This pull request has merge conflicts and has been closed automatically.",
                  "",
                  "Please update your branch with the latest `main`, resolve the conflicts, and open a new pull request."
                ].join("\n")
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number,
                state: "closed"
              });

              return;
            }

            if (pr.data.mergeable !== true) {
              core.setFailed("GitHub has not finished calculating mergeability. Re-run the workflow.");
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number,
              merge_method: "squash"
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: "## ✅ Pull request merged automatically."
            });
